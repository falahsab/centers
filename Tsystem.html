<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام بحث سريع</title>

<style>
body{
  font-family:Tajawal;
  background:#f5f7fb;
  padding:20px;
}

h3{
  text-align:center;
}

/* بحث */
input{
  width:100%;
  max-width:450px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  display:block;
  margin:auto;
}

/* معلومات */
#info{
  text-align:center;
  margin:10px;
  font-weight:bold;
}

/* بطاقات */
.card{
  background:#fff;
  padding:12px;
  margin:10px auto;
  max-width:520px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* أزرار */
button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:5px;
}

.edit{background:#3b82f6;color:white;}
.color{background:#f59e0b;color:white;}

/* Modal */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.4);
}

/* Grid */
.modal-content{
  background:#fff;
  width:90%;
  max-width:650px;
  margin:60px auto;
  padding:15px;
  border-radius:12px;

  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.field{
  display:flex;
  flex-direction:column;
}

.field input{
  padding:6px;
  border:1px solid #ddd;
  border-radius:6px;
}

/* Toast */
.toast{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111827;
  color:white;
  padding:12px 20px;
  border-radius:10px;
  opacity:0;
  transition:.2s;
  z-index:9999;
}

.toast.show{
  opacity:1;
}
</style>
</head>

<body>

<h3>⚡ نظام بحث سريع</h3>

<input id="search" placeholder="ابحث هنا..." oninput="search()">

<div id="info">⏳ جاري تحميل البيانات...</div>

<div id="results"></div>

<div id="toast" class="toast"></div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">

    <div id="modalBody"></div>

    <div style="grid-column:span 2;display:flex;justify-content:space-between">
      <button class="edit" onclick="save()">💾 حفظ</button>
      <button onclick="closeModal()">إغلاق</button>
    </div>

  </div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwKk-34bAr5O_MhM1uuMh1Bd8XYEq9b1kn3VMYr1GwdVqTEqddp3ALeNiBo3pD_vqJp/exec";

let data = [];
let headers = [];
let currentRow = null;

// ================= تحميل البيانات =================
fetch(API)
.then(r => r.json())
.then(res => {

  if(res.error){
    document.getElementById("info").innerText = "❌ خطأ: " + res.error;
    return;
  }

  data = res.rows;
  headers = res.headers;

  document.getElementById("info").innerText =
    "📊 عدد الصفوف: " + data.length;
});

// ================= البحث =================
function search(){

  let q = document.getElementById("search").value.trim().toLowerCase();
  let box = document.getElementById("results");
  box.innerHTML = "";

  if(!q){
    return;
  }

  let filtered = data.filter(i => {

    let c0 = (i.values?.[0] || "").toString().toLowerCase();
    let c1 = (i.values?.[1] || "").toString().toLowerCase();

    return c0.includes(q) || c1.includes(q);
  });

  if(filtered.length === 0){
    box.innerHTML = `<div style="text-align:center;color:#888">❌ لا توجد نتائج</div>`;
    return;
  }

  filtered.forEach(item => {

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div>📌 ${item.values?.[0] || ""}</div>
      <div>📌 ${item.values?.[1] || ""}</div>
      <div>📌 ${item.values?.[2] || ""}</div>
      <div>🆔 ${item.values?.[3] || ""}</div>

      <button class="edit" onclick="openModal('${item.values?.[2]}')">تعديل</button>
      <button class="color" onclick="color(${item.row})">تلوين</button>
    `;

    box.appendChild(div);
  });
}

// ================= Modal =================
function openModal(id){

  fetch(API + "?action=getById&id=" + id)
  .then(r => r.json())
  .then(res => {

    currentRow = res.row;

    let html = "";

    res.values.forEach((v, i) => {
      html += `
        <div class="field">
          <label>${headers[i]}</label>
          <input value="${v}">
        </div>
      `;
    });

    document.getElementById("modalBody").innerHTML = html;
    document.getElementById("modal").style.display = "block";
  });
}

// ================= حفظ =================
function save(){

  let inputs = document.querySelectorAll("#modalBody input");

  let values = [];
  inputs.forEach(i => values.push(i.value));

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "update",
      row: currentRow,
      values: values
    })
  })
  .then(() => {

    fetch(API + "?action=color&row=" + currentRow);

    toast("تم الحفظ");
    closeModal();
  });
}

// ================= تلوين =================
function color(row){
  fetch(API + "?action=color&row=" + row)
  .then(() => toast("تم التلوين"));
}

// ================= إغلاق =================
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

// ================= Toast =================
function toast(msg){

  let t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  setTimeout(() => t.classList.remove("show"), 900);
}

</script>

</body>
</html>
