<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="كول سنتر">
<meta property="og:description" content="بنقرة احصل على المعلومة">
<title>📞 كول سنتر</title>

<style>
  body {
    margin: 0;
    font-family: "Tajawal", sans-serif;
    background: #f3f4f6;
    color: #1e293b;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* 🎯 شريط التبويبات */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    background: #0f172a;
    padding: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
  }

  .tab {
    padding: 10px 24px;
    cursor: pointer;
    border-radius: 10px;
    background: #1e293b;
    color: #e2e8f0;
    font-weight: 500;
    transition: all 0.2s ease;
    border: 1px solid transparent;
  }

  .tab:hover {
    background: #334155;
    transform: translateY(-1px);
  }

  .tab.active {
    background: #06b6d4;
    color: #fff;
    border: 1px solid #0ea5e9;
    box-shadow: 0 0 8px rgba(6, 182, 212, 0.4);
  }

  /* 📄 محتوى الإطار */
  #content {
    flex: 1;
    width: 100%;
    display: flex;
    justify-content: center;
    background: #f8fafc;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-top: 1px solid #e2e8f0;
  }

  /* 📱 استجابة للجوال */
  @media (max-width: 480px) {
    .tab {
      padding: 8px 14px;
      font-size: 15px;
    }
  }
</style>
</head>

<body>

  <!-- 🔹 شريط التبويبات -->
  <div class="tabs">
    <div class="tab active">🏢 المراكز</div>
    <div class="tab">💸 الحوالات</div>
    <div class="tab">📜 التعميمات</div>
  </div>

  <!-- 🧩 محتوى التبويب -->
  <div id="content">
    <iframe src="/centers.html"></iframe>
    <iframe src="trans0.html" style="display:none"></iframe>
    <iframe src="memos.html" style="display:none"></iframe>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const iframes = document.querySelectorAll('#content iframe');

    tabs.forEach((tab, index) => {
      tab.addEventListener('click', () => {
        // إزالة active من جميع التبويبات
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        // إخفاء جميع iframes
        iframes.forEach(f => f.style.display = 'none');

        // عرض iframe التبويب المحدد
        iframes[index].style.display = 'block';
      });
    });
  </script>

</body>
</html>
